name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: bluefood
          POSTGRES_PASSWORD: bluefood_dev
          POSTGRES_DB: bluefood_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node.js dependencies
        run: |
          npm ci || npm install

      - name: Wait for PostgreSQL to be ready
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -U bluefood && exit 0
            sleep 1
          done
          echo "PostgreSQL failed to start"
          exit 1

      - name: Initialize PostgreSQL database schema
        env:
          PGHOST: localhost
          PGUSER: bluefood
          PGPASSWORD: bluefood_dev
          PGDATABASE: bluefood_db
        run: |
          # Create audit log table with immutable rules
          psql -c "
          CREATE TABLE IF NOT EXISTS audit_log_entries (
            id BIGSERIAL PRIMARY KEY,
            entity_type VARCHAR(50) NOT NULL,
            entity_id UUID NOT NULL,
            action VARCHAR(50) NOT NULL,
            actor_id UUID,
            timestamp TIMESTAMPTZ DEFAULT CURRENT_TIMESTAMP,
            before_state JSONB,
            after_state JSONB,
            ip_address INET
          );
          CREATE INDEX IF NOT EXISTS idx_audit_entity ON audit_log_entries(entity_type, entity_id);
          CREATE INDEX IF NOT EXISTS idx_audit_timestamp ON audit_log_entries(timestamp DESC);
          CREATE RULE audit_log_no_update AS ON UPDATE TO audit_log_entries DO INSTEAD NOTHING;
          CREATE RULE audit_log_no_delete AS ON DELETE TO audit_log_entries DO INSTEAD NOTHING;
          "
          
          # Create shipments table
          psql -c "
          CREATE TABLE IF NOT EXISTS shipments (
            id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
            product_name VARCHAR(255) NOT NULL,
            quantity NUMERIC NOT NULL,
            farm_id UUID NOT NULL,
            harvest_date TIMESTAMP NOT NULL,
            status VARCHAR(50) DEFAULT 'draft',
            qr_code VARCHAR(255) UNIQUE,
            created_at TIMESTAMPTZ DEFAULT CURRENT_TIMESTAMP,
            updated_at TIMESTAMPTZ DEFAULT CURRENT_TIMESTAMP,
            deleted_at TIMESTAMPTZ
          );
          CREATE INDEX IF NOT EXISTS idx_shipment_status ON shipments(status);
          CREATE INDEX IF NOT EXISTS idx_shipment_farm ON shipments(farm_id);
          CREATE INDEX IF NOT EXISTS idx_shipment_qr ON shipments(qr_code);
          CREATE INDEX IF NOT EXISTS idx_shipment_deleted ON shipments(deleted_at);
          "
          
          # Create users table
          psql -c "
          CREATE TABLE IF NOT EXISTS users (
            id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
            username VARCHAR(255) NOT NULL UNIQUE,
            password_hash VARCHAR(255) NOT NULL,
            email VARCHAR(255) NOT NULL,
            phone_number VARCHAR(20),
            role VARCHAR(50) NOT NULL,
            status VARCHAR(50) DEFAULT 'active',
            created_at TIMESTAMPTZ DEFAULT CURRENT_TIMESTAMP,
            updated_at TIMESTAMPTZ DEFAULT CURRENT_TIMESTAMP,
            deleted_at TIMESTAMPTZ
          );
          CREATE INDEX IF NOT EXISTS idx_user_username ON users(username);
          CREATE INDEX IF NOT EXISTS idx_user_role ON users(role);
          CREATE INDEX IF NOT EXISTS idx_user_status ON users(status);
          "

      - name: Set environment variables for Copilot
        run: |
          echo "DATABASE_URL=postgresql://bluefood:bluefood_dev@localhost:5432/bluefood_db" >> $GITHUB_ENV
          echo "NODE_ENV=development" >> $GITHUB_ENV
          echo "LOG_LEVEL=info" >> $GITHUB_ENV
